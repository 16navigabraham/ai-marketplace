[profile.default]
src = 'src'
out = 'out'
libs = ['lib']
test = 'test'
cache_path = 'cache'

# Optimizer settings
optimizer = true
optimizer_runs = 200

# Solidity version
solc = '0.8.20'

# EVM version
evm_version = 'paris'

[profile.test]
optimizer = false

[profile.production]
optimizer_runs = 1000

# Named RPC endpoints — deploy with: forge script ... --rpc-url base_sepolia
[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC}"
eth_sepolia = "${ETH_SEPOLIA_RPC}"

# Block-explorer verification — used by `forge script ... --verify`.
# Basescan/Etherscan-V2 multichain key works for both networks below.
[etherscan]
base_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 84532, url = "https://api-sepolia.basescan.org/api" }
eth_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }
